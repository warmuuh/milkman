name: Release

on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v2
    - uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-
    - name: Set up JDK 21
      uses: actions/setup-java@v2
      with:
        distribution: liberica
        java-version: 21
        architecture: x64
    - name: maven-settings-xml-action
      uses: whelk-io/maven-settings-xml-action@v4
      with:
        servers: '[{ "id": "github", "privateKey": "${{ secrets.DEPLOYMENT_KEY }}", "username": "${{ github.actor }}", "password": "${{ secrets.DEPLOYMENT_KEY }}" }]'
    - name: Maven stats
      run: ./mvnw.cmd -version
    - name: Bump to release version
      run: ./mvnw.cmd --% -B org.codehaus.mojo:build-helper-maven-plugin:3.0.0:parse-version versions:set versions:commit -DnewVersion="${parsedVersion.majorVersion}.${parsedVersion.minorVersion}.${parsedVersion.incrementalVersion}"
    - name: Package
      run: ./mvnw.cmd -B package -DexcludedGroups=ui
    - name: Commit files
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git commit -m "release version" -a
    - name: Push changes
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
    - name: create tag
      run: ./mvnw.cmd --% org.codehaus.mojo:exec-maven-plugin:1.6.0:exec -Dexec.executable="git" -Dexec.args="tag ${project.version}" -pl milkman
    - name: Push changes
      uses: ad-m/github-push-action@master
      with:
        tags: true
        github_token: ${{ secrets.GITHUB_TOKEN }}
    - name: Deploy
      run: ./mvnw.cmd -B deploy -DskipTests
    - name: Bump version to next dev version
      run: ./mvnw.cmd --% -B org.codehaus.mojo:build-helper-maven-plugin:3.0.0:parse-version versions:set versions:commit -DnewVersion="${parsedVersion.majorVersion}.${parsedVersion.nextMinorVersion}.0-SNAPSHOT"
    - name: Commit files
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git commit -m "preparing next version" -a
    - name: Push changes
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}

  update-tap:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Update Homebrew tap
        env:
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
        run: |
          RELEASE=$(curl -s https://api.github.com/repos/warmuuh/milkman/releases/latest)
          VERSION=$(echo "$RELEASE" | jq -r '.tag_name')
          ASSET_URL="https://github.com/warmuuh/milkman/releases/download/${VERSION}/milkman-dist-appbundle-macos64-bin.tgz"

          curl -sL "$ASSET_URL" -o milkman.tgz
          SHA256=$(sha256sum milkman.tgz | cut -d' ' -f1)

          mkdir -p ~/.ssh
          echo "$TAP_DEPLOY_KEY" > ~/.ssh/tap_key
          chmod 600 ~/.ssh/tap_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_key -o IdentitiesOnly=yes"

          git clone git@github.com:warmuuh/homebrew-milkman.git tap
          sed -i "s/version \".*\"/version \"${VERSION}\"/" tap/Casks/milkman.rb
          sed -i "s/sha256 \".*\"/sha256 \"${SHA256}\"/" tap/Casks/milkman.rb
          cd tap
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add Casks/milkman.rb
          git commit -m "update milkman to ${VERSION}"
          git push
